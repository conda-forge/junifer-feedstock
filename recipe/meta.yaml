{% set name = "junifer" %}
{% set version = "0.0.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/junifer-{{ version }}.tar.gz
  sha256: 3577c13c2d678922b3658b6c7bde17ea6aa274e99e8e1840e5fc7ca9a15e4bd7

build:
  noarch: python
  entry_points:
    - junifer = junifer.api.cli:cli
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=70
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - click >=8.1.3,<8.2
    - numpy >=1.26.0,<2.0.0
    - scipy >=1.10.0,<=1.15.0
    - datalad >=1.0.0,<1.2.0
    - pandas >=2.0.0,<2.3.0
    - nibabel >=5.2.0,<5.4.0
    - nilearn >=0.10.3,<=0.10.4
    - sqlalchemy >=2.0.25,<=2.1.0
    - ruamel.yaml >=0.17,<0.19
    - h5py >=3.10
    - tqdm >=4.66.1,<4.67.0
    - templateflow >=23.0.0
    - lapy >=1.0.0,<2.0.0
    - lazy_loader ==0.4
    - importlib-metadata
    - junifer-data ==1.3.0
    - looseversion ==1.3.0
    - bctpy >=0.6.0,<0.7.0
    - neurokit2 >=0.1.7

test:
  imports:
    - junifer
  commands:
    - pip check
    - junifer --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/juaml/junifer
  summary: JUelich NeuroImaging FEature extractoR
  license: AGPL-3.0-only
  license_file: LICENSE.md
  doc_url: https://juaml.github.io/junifer/main/index.html
  dev_url: https://github.com/juaml/junifer

extra:
  recipe-maintainers:
    - synchon
